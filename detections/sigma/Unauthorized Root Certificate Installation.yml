title: Unauthorized Root Certificate Installation by Non-System Process
id: c3456789-d012-e345-f678-901234567890
status: experimental
description: Detects installation of root certificates into the Windows certificate store by processes other than TrustedInstaller or SYSTEM. Root certificate installation enables man-in-the-middle attacks and TLS traffic interception without browser warnings. Observed in APT10 detonation 2026-03-30 where EndpointBasecamp.exe installed a rogue root certificate in the same session as timestomping and PowerShell logging suppression, indicating deliberate hardening for covert access. This is a critical technique indicating attack infrastructure setup.
references:
    - https://thedfirreport.com/2024/01/15/apt10-detonation-analysis/
author: Loaded Potato APT10 Analysis Team
date: 2026-04-08
modified: 2026-04-08
tags:
    - attack.defense-evasion
    - attack.t1556.004
    - attack.persistence
    - APT10
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|startswith: 'HKLM\SOFTWARE\Microsoft\SystemCertificates\Root'
        TargetObject|contains:
            - 'Certificates'
            - 'CTL'
    filter_system_process:
        Image|endswith:
            - 'TrustedInstaller.exe'
            - 'svchost.exe'
            - 'lsass.exe'
    filter_privileged_user:
        User: 'NT AUTHORITY\SYSTEM'
    condition: selection and not 1 of filter_*
falsepositives:
    - Legitimate antivirus or proxy software certificate installation (rare)
level: high
