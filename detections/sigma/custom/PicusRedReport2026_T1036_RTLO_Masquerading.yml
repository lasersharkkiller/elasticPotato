title: Right-to-Left Override Character in Filename - Masquerading (Picus Red Report 2026 - T1036)
id: a1b2c3d4-1007-4aaa-b007-000000000007
status: experimental
description: >
    Detects the use of Right-to-Left Override (RTLO/RLO) Unicode character
    (U+202E) in filenames to disguise executable files as benign document types.
    Ferocious Kitten campaign used RTLO to flip file extensions, making a malicious
    .exe appear as .pdf or image file. T1036 Masquerading rose to #6 in Picus Red
    Report 2026 (16.59% prevalence). Mustang Panda also deployed malware with
    invalid/expired digital signatures that fooled superficial checks.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1036/002/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.defense-evasion
    - attack.t1036.002
    - picus.redreport.2026
    - Ferocious.Kitten
    - Mustang.Panda
logsource:
    category: file_event
    product: windows
detection:
    selection_rtlo:
        TargetFilename|contains:
            - "\u202e"
            - "\u200e"
            - "\u200f"
    condition: selection_rtlo
falsepositives:
    - Legitimate files with RTL script names (Arabic, Hebrew) - very rare in enterprise
level: critical
