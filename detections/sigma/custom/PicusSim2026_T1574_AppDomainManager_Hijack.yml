title: AppDomainManager DLL Hijacking via Environment Variables (Picus Sim 2026-04-12)
id: d4e5f6a7-2003-4bbb-c003-picus20260412
status: experimental
description: >
    Detects .NET AppDomainManager injection where an attacker copies a malicious
    DLL (e.g., DomainManager.dll) to a system directory and sets APPDOMAIN_MANAGER_ASM
    and APPDOMAIN_MANAGER_TYPE environment variables to hijack CLR initialization.
    Any .NET application that loads will execute the attacker's assembly. Observed
    in Picus simulation 2026-04-12 copying DomainManager.dll to system32 then
    setting environment variables and launching a .NET binary.
    T1574.014 - Hijack Execution Flow: AppDomainManager.
references:
    - https://attack.mitre.org/techniques/T1574/014/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.persistence
    - attack.defense-evasion
    - attack.privilege-escalation
    - attack.t1574.014
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_env_var:
        CommandLine|contains:
            - 'APPDOMAIN_MANAGER_ASM='
            - 'APPDOMAIN_MANAGER_TYPE='
    selection_dll_copy:
        CommandLine|contains|all:
            - 'copy'
            - 'DomainManager'
            - '\system32'
    condition: selection_env_var or selection_dll_copy
falsepositives:
    - Custom .NET application frameworks using AppDomainManager legitimately (very rare)
level: high
