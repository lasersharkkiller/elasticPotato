title: Suspicious XDG Autostart Desktop File Creation (Picus Red Report 2026 - T1547)
id: a1b2c3d4-1009-4aaa-b009-000000000009
status: experimental
description: >
    Detects creation of .desktop files in XDG autostart directories on Linux,
    a persistence technique used by EtherRAT. The malware creates hidden
    .desktop files in ~/.config/autostart/ to silently launch with every user
    login. T1547 Boot or Logon Autostart Execution rose to #7 in Picus Red
    Report 2026. Also covers APT36/Transparent Tribe's swcbc malware which
    created systemd user services for persistence on Linux/BOSS systems.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1547/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.persistence
    - attack.t1547
    - picus.redreport.2026
    - EtherRAT
    - APT36
logsource:
    category: file_event
    product: linux
detection:
    selection_xdg_autostart:
        TargetFilename|contains:
            - '/.config/autostart/'
            - '/.local/share/autostart/'
        TargetFilename|endswith: '.desktop'
    selection_systemd_user_service:
        TargetFilename|contains: '/.config/systemd/user/'
        TargetFilename|endswith: '.service'
    filter_package_managers:
        Image|contains:
            - '/apt'
            - '/dpkg'
            - '/rpm'
            - '/yum'
            - '/dnf'
            - '/pacman'
    condition: (selection_xdg_autostart or selection_systemd_user_service) and not filter_package_managers
falsepositives:
    - Legitimate application installation creating autostart entries
    - Desktop environment customization
level: high
