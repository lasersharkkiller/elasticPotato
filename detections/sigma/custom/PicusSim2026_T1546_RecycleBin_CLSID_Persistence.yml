title: Recycle Bin CLSID Shell Command Persistence (Picus Sim 2026-04-12)
id: d4e5f6a7-2004-4bbb-c004-picus20260412
status: experimental
description: >
    Detects modification of the Recycle Bin COM CLSID shell\open\command registry
    key ({645FF040-5081-101B-9F08-00AA002F954E}) to execute arbitrary commands
    when a user opens the Recycle Bin in Explorer. This is a stealthy persistence
    mechanism that hijacks the COM handler for a built-in Windows shell object.
    Observed in Picus simulation 2026-04-12 via RecycleBinPersistence.exe setting
    the shell command to calc.exe (proof of concept).
    T1546.015 - Event Triggered Execution: Component Object Model Hijacking.
references:
    - https://attack.mitre.org/techniques/T1546/015/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1546.015
    - picus.simulation.2026-04-12
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains|all:
            - '{645FF040-5081-101B-9F08-00AA002F954E}'
            - '\shell\open\command'
    condition: selection
falsepositives:
    - Legitimate shell extension software modifying Recycle Bin behavior (extremely rare)
level: high
