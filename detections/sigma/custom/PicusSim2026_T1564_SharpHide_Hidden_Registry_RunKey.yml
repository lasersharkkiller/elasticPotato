title: SharpHide Hidden Registry Run Key Persistence (Picus Sim 2026-04-12)
id: d4e5f6a7-2009-4bbb-c009-picus20260412
status: experimental
description: >
    Detects execution of SharpHide.exe, a tool that creates hidden Run registry
    keys by prepending a null byte to the value name. These keys are invisible
    to regedit.exe and most registry enumeration tools but are processed by
    Windows at startup. Observed in Picus simulation 2026-04-12 creating a
    hidden Run key pointing to C:\Windows\Temp\Bla.exe.
    T1564.001 - Hide Artifacts: Hidden Files and Directories.
    T1547.001 - Boot or Logon Autostart Execution: Registry Run Keys.
references:
    - https://attack.mitre.org/techniques/T1564/001/
    - https://attack.mitre.org/techniques/T1547/001/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.persistence
    - attack.defense-evasion
    - attack.t1564.001
    - attack.t1547.001
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_sharphide:
        Image|endswith:
            - '\SharpHide.exe'
            - '\sharphide.exe'
    selection_cmdline:
        CommandLine|contains:
            - 'SharpHide'
            - 'sharphide'
    condition: selection_sharphide or selection_cmdline
falsepositives:
    - Authorized red team or penetration testing exercises
level: critical
