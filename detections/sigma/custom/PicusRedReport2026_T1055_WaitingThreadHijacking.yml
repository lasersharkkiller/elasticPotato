title: Waiting Thread Hijacking - Dormant Thread Context Modification (Picus Red Report 2026 - T1055.003)
id: a1b2c3d4-1003-4aaa-b003-000000000003
status: experimental
description: >
    Detects Waiting Thread Hijacking, a 2025-discovered evolution of thread
    execution hijacking where adversaries target existing threads in a waiting
    state rather than creating new suspended threads. The attacker allocates
    memory inside a legitimate process, writes a payload, and modifies the
    dormant thread's context so the next wake event redirects execution to
    attacker-controlled code. Used by banking Trojans and credential-stealers.
    Also detects Threadless Operations where execution binds to APC delivery
    or I/O completion routines. Picus Red Report 2026 - T1055 #1 technique.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1055/003/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.defense-evasion
    - attack.privilege-escalation
    - attack.t1055.003
    - picus.redreport.2026
logsource:
    category: process_access
    product: windows
detection:
    selection_remote_thread_access:
        GrantedAccess|contains:
            - '0x1FFFFF'
            - '0x1F3FFF'
            - '0x143A'
        SourceImage|endswith:
            - '.exe'
        TargetImage|endswith:
            - '\explorer.exe'
            - '\svchost.exe'
            - '\RuntimeBroker.exe'
            - '\sihost.exe'
            - '\taskhostw.exe'
    selection_set_context:
        CallTrace|contains:
            - 'SetThreadContext'
            - 'NtSetContextThread'
            - 'NtQueueApcThread'
    filter_legitimate:
        SourceImage|contains:
            - '\Windows\System32\'
            - '\Windows\SysWOW64\'
            - '\Program Files\'
            - '\Program Files (x86)\'
    condition: (selection_remote_thread_access and selection_set_context) and not filter_legitimate
falsepositives:
    - Debugging tools and crash handlers
    - Application compatibility shims
level: critical
