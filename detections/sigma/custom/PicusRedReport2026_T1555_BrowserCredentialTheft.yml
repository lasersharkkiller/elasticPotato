title: Browser Credential Store Access by Non-Browser Process (Picus Red Report 2026 - T1555.003)
id: a1b2c3d4-1014-4aaa-b014-000000000014
status: experimental
description: >
    Detects non-browser processes accessing browser credential storage files.
    T1555 Credentials from Password Stores ranked #3 in Picus Red Report 2026
    (23% prevalence, 254K+ samples). SantaStealer bypassed Chrome AppBound
    encryption by abusing legitimate browser APIs. Meduza Stealer, BeaverTail,
    Shai-Hulud 2.0, and Makop ransomware also harvest browser credentials.
    Earth Ammit, UNC3944, and Storm-0501 APT groups use this technique.
    This rule detects access to Chrome, Firefox, Edge, and Brave credential
    files by processes that are not the browser itself.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1555/003/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.credential-access
    - attack.t1555.003
    - picus.redreport.2026
    - SantaStealer
    - Meduza.Stealer
    - Earth.Ammit
    - UNC3944
    - Storm-0501
logsource:
    category: file_access
    product: windows
detection:
    selection_chrome:
        TargetFilename|contains:
            - '\Google\Chrome\User Data\Default\Login Data'
            - '\Google\Chrome\User Data\Default\Cookies'
            - '\Google\Chrome\User Data\Local State'
            - '\Google\Chrome\User Data\Default\Web Data'
    selection_edge:
        TargetFilename|contains:
            - '\Microsoft\Edge\User Data\Default\Login Data'
            - '\Microsoft\Edge\User Data\Default\Cookies'
            - '\Microsoft\Edge\User Data\Local State'
    selection_firefox:
        TargetFilename|contains:
            - '\Mozilla\Firefox\Profiles\'
        TargetFilename|endswith:
            - '\logins.json'
            - '\key4.db'
            - '\cookies.sqlite'
    selection_brave:
        TargetFilename|contains:
            - '\BraveSoftware\Brave-Browser\User Data\Default\Login Data'
    filter_browser:
        Image|endswith:
            - '\chrome.exe'
            - '\msedge.exe'
            - '\firefox.exe'
            - '\brave.exe'
    filter_system:
        Image|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
    condition: (selection_chrome or selection_edge or selection_firefox or selection_brave) and not (filter_browser or filter_system)
falsepositives:
    - Legitimate password migration tools
    - Browser update processes
    - Backup utilities
level: critical
