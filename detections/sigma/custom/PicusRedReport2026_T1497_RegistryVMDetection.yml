title: VM/Sandbox Detection via Registry and WMI Queries (Picus Red Report 2026 - T1497)
id: a1b2c3d4-1005-4aaa-b005-000000000005
status: experimental
description: >
    Detects processes querying registry keys or WMI classes commonly used for
    virtualization and sandbox environment detection. T1497 surged to rank #4
    in Picus Red Report 2026. Modern malware including LummaC2 and Blitz
    performs extensive environment fingerprinting before detonating, checking
    for VM artifacts in registry, WMI (Win32_ComputerSystem Manufacturer/Model),
    MAC address OUI prefixes, and hardware identifiers.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1497/001/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.defense-evasion
    - attack.t1497.001
    - picus.redreport.2026
    - LummaC2
    - Blitz
logsource:
    category: registry_event
    product: windows
detection:
    selection_vm_registry:
        TargetObject|contains:
            - 'SOFTWARE\VMware, Inc.'
            - 'SOFTWARE\Oracle\VirtualBox'
            - 'SYSTEM\CurrentControlSet\Services\VBoxGuest'
            - 'SYSTEM\CurrentControlSet\Services\vmci'
            - 'SYSTEM\CurrentControlSet\Services\vmhgfs'
            - 'SOFTWARE\Microsoft\Virtual Machine\Guest\Parameters'
            - 'SYSTEM\CurrentControlSet\Enum\PCI\VEN_15AD'
            - 'SYSTEM\CurrentControlSet\Enum\PCI\VEN_80EE'
    filter_vmtools:
        Image|contains:
            - '\VMware\'
            - '\VirtualBox\'
    condition: selection_vm_registry and not filter_vmtools
falsepositives:
    - VM management agents querying their own configuration
level: medium
