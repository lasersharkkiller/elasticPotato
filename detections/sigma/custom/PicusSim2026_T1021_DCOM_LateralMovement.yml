title: DCOM Lateral Movement via Offensive Tools (Picus Sim 2026-04-12)
id: d4e5f6a7-2015-4bbb-c015-picus20260412
status: experimental
description: >
    Detects execution of DCOM-based lateral movement tools (CheeseDCOM, CsDCOM)
    that abuse COM objects (MMC20.Application, ShellWindows, ShellBrowserWindow)
    to execute commands on remote hosts. These tools are used by ransomware
    operators and APT groups for fileless lateral movement. Observed in Picus
    simulation 2026-04-12.
    T1021.003 - Remote Services: Distributed Component Object Model.
references:
    - https://attack.mitre.org/techniques/T1021/003/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.lateral-movement
    - attack.t1021.003
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_dcom_tools:
        Image|endswith:
            - '\CheeseDCOM.exe'
            - '\CsDCOM.exe'
            - '\dcomexec.exe'
    selection_dcom_cmdline:
        CommandLine|contains:
            - 'MMC20Application'
            - 'ShellWindows'
            - 'ShellBrowserWindow'
            - 'ExcelDDE'
    condition: selection_dcom_tools or selection_dcom_cmdline
falsepositives:
    - Authorized penetration testing
level: critical
