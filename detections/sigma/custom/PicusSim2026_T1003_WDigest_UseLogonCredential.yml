title: WDigest UseLogonCredential Registry Modification for Credential Theft (Picus Sim 2026-04-12)
id: d4e5f6a7-2017-4bbb-c017-picus20260412
status: experimental
description: >
    Detects enabling WDigest authentication by setting UseLogonCredential=1 in
    the registry. This forces Windows to store plaintext passwords in LSASS
    memory, enabling credential dumping via Mimikatz sekurlsa::wdigest. Disabled
    by default since Windows 8.1/Server 2012 R2 (KB2871997). Observed in Picus
    simulation 2026-04-12 via reg.exe and PowerShell.
    T1003 - OS Credential Dumping (preparation).
references:
    - https://attack.mitre.org/techniques/T1003/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.credential-access
    - attack.t1003
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_reg:
        CommandLine|contains|all:
            - 'WDigest'
            - 'UseLogonCredential'
    filter_enable:
        CommandLine|contains: '/d 1'
    condition: selection_reg and filter_enable
falsepositives:
    - Legacy application compatibility requiring WDigest (should be investigated)
level: critical
