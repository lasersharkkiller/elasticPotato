title: Execution of Binary with Invalid or Expired Digital Signature (Picus Red Report 2026 - T1036.001)
id: a1b2c3d4-1008-4aaa-b008-000000000008
status: experimental
description: >
    Detects execution of binaries masquerading as legitimate software using
    invalid, expired, or revoked digital signatures. Mustang Panda deployed
    malware with invalid digital signatures that fooled superficial checks.
    Warp Panda used BRICKSTORM and Junction malware with similar techniques.
    T1036 Masquerading ranked #6 in Picus Red Report 2026. This covers
    T1036.001 Invalid Code Signature sub-technique.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1036/001/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.defense-evasion
    - attack.t1036.001
    - picus.redreport.2026
    - Mustang.Panda
    - Warp.Panda
logsource:
    category: process_creation
    product: windows
detection:
    selection_system_name:
        Image|endswith:
            - '\svchost.exe'
            - '\csrss.exe'
            - '\lsass.exe'
            - '\services.exe'
            - '\smss.exe'
            - '\winlogon.exe'
            - '\spoolsv.exe'
            - '\wininit.exe'
            - '\taskhost.exe'
            - '\RuntimeBroker.exe'
            - '\update.exe'
    filter_system32:
        Image|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
            - 'C:\Windows\WinSxS\'
    condition: selection_system_name and not filter_system32
falsepositives:
    - Legitimate software with non-standard installation paths
level: high
