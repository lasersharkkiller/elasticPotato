title: Suspicious Cloud API C2 Communication (Picus Red Report 2026 - T1071)
id: a1b2c3d4-1006-4aaa-b006-000000000006
status: experimental
description: >
    Detects suspicious outbound connections to cloud API endpoints commonly abused
    as covert C2 channels. Picus Red Report 2026 (#5 technique, T1071) documents
    adversaries "living off the cloud" - routing C2 through high-reputation APIs.
    SesameOp backdoor used OpenAI Assistants API as C2 relay, masking traffic as
    legitimate AI development. LameHug and MalTerminal also abused cloud APIs.
    Storm-0501 queried AWS Secrets Manager to harvest credentials. IOCONTROL
    (Cyber Av3ngers) used application layer protocols for C2. This rule flags
    non-browser processes communicating with these APIs.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1071/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.command-and-control
    - attack.t1071
    - attack.t1059.009
    - picus.redreport.2026
    - SesameOp
    - LameHug
    - Storm-0501
logsource:
    category: dns_query
    product: windows
detection:
    selection_cloud_c2_domains:
        QueryName|endswith:
            - 'api.openai.com'
            - 'lambda-url.on.aws'
            - 'execute-api.amazonaws.com'
            - 'secretsmanager.amazonaws.com'
            - 'vault.azure.net'
            - 'cloudfunctions.net'
            - 'run.app'
            - 'azurewebsites.net'
    filter_browser:
        Image|endswith:
            - '\chrome.exe'
            - '\msedge.exe'
            - '\firefox.exe'
            - '\brave.exe'
            - '\opera.exe'
            - '\iexplore.exe'
    filter_legitimate_dev:
        Image|contains:
            - '\Python'
            - '\node.exe'
            - '\code.exe'
            - '\Visual Studio'
            - '\dotnet.exe'
    condition: selection_cloud_c2_domains and not (filter_browser or filter_legitimate_dev)
falsepositives:
    - Legitimate applications using cloud APIs directly
    - Development tools and SDKs
level: high
