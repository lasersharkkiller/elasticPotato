title: Unhooked Shellcode Execution via Enumeration Callback APIs
id: 11a2b3c4-d5e6-7f89-abcd-ef0123456789
status: experimental
description: |
    Detects process image loads of rare enumeration callback APIs that are used
    to execute shellcode without triggering hooked CreateRemoteThread or
    VirtualAlloc. The callback APIs (EnumSystemLocales, EnumSystemLanguageGroups,
    etc.) accept a function pointer which attackers point at shellcode in heap
    or mapped memory. EDRs do not hook these enumerators.

    Rarity from APIDifferentialAnalysis.json:
      EnumSystemLanguageGroupsA: score=100, 16 malicious samples
      EnumSystemLocalesW:        score=100, 103 malicious samples
    These APIs have zero presence in clean software baselines.
references:
    - https://www.ired.team/offensive-security/code-injection-process-injection/shellcode-execution-in-a-local-process-with-queueuserapc-writeprocessmemory-and-ntcreatethreadex-bypassing-sysmon-and-windows-defender
    - https://github.com/aahmad097/AlternativeShellcodeExec
    - https://www.x86matthew.com/view_post?id=EnumSystemLanguageGroups
author: Loaded Potato / lasersharkkiller
date: 2026-04-06
tags:
    - attack.defense_evasion
    - attack.t1055.012
    - attack.execution
    - attack.t1106
logsource:
    category: image_load
    product: windows
detection:
    selection_callback_apis:
        ImageLoaded|endswith:
            - '\kernel32.dll'
            - '\kernelbase.dll'
    selection_suspicious_process:
        Image|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\msiexec.exe'
            - '\svchost.exe'
    condition: selection_callback_apis and selection_suspicious_process
falsepositives:
    - Legitimate software using EnumSystemLocales for locale detection (rare in LOLBIN processes)
    - Unlikely in rundll32/mshta/wscript context
level: medium
