title: Impair Defenses - Defender Disable via SystemSettingsAdminFlows or Registry (Picus Red Report 2026 - T1562)
id: a1b2c3d4-1010-4aaa-b010-000000000010
status: experimental
description: >
    Detects attempts to disable Windows Defender via SystemSettingsAdminFlows.exe
    abuse or direct registry manipulation. Deadlock ransomware abused
    SystemSettingsAdminFlows.exe to quietly disable Defender real-time protection
    and cloud reporting. RealBlindingEDR tools surgically remove kernel callbacks
    to blind EDR sensors. ValleyRAT injects Add-MpPreference -ExclusionPath to
    whitelist attacker directories. T1562 Impair Defenses ranked #8 in Picus Red
    Report 2026 (14.18% prevalence). Used by Mustang Panda, Crypto24, Mimic,
    Remcos RAT, LockBit, RansomHub, Medusa ransomware.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1562/001/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - picus.redreport.2026
    - Deadlock
    - ValleyRAT
    - LockBit
    - RansomHub
    - Medusa
logsource:
    category: process_creation
    product: windows
detection:
    selection_systemsettings:
        Image|endswith: '\SystemSettingsAdminFlows.exe'
        CommandLine|contains:
            - 'DisableRealtimeMonitoring'
            - 'DisableAntiSpyware'
            - 'DisableIOAVProtection'
    selection_defender_exclusion:
        CommandLine|contains|all:
            - 'Add-MpPreference'
            - '-ExclusionPath'
    selection_defender_registry:
        CommandLine|contains:
            - 'DisableRealtimeMonitoring'
            - 'DisableAntiSpyware'
            - 'DisableBehaviorMonitoring'
            - 'DisableIOAVProtection'
            - 'DisableOnAccessProtection'
        CommandLine|contains:
            - 'reg add'
            - 'Set-ItemProperty'
            - 'New-ItemProperty'
    selection_null_amsi:
        CommandLine|contains:
            - 'AmsiInitFailed'
            - 'amsi.dll'
            - 'AmsiScanBuffer'
    condition: selection_systemsettings or selection_defender_exclusion or selection_defender_registry or selection_null_amsi
falsepositives:
    - IT administrators legitimately configuring Defender exclusions
    - Automated deployment scripts that configure AV exclusions
level: high
