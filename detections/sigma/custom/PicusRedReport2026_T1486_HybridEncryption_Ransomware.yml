title: Ransomware Hybrid Encryption Indicators - VSS Deletion Chain (Picus Red Report 2026 - T1486)
id: a1b2c3d4-1013-4aaa-b013-000000000013
status: experimental
description: >
    Detects the full ransomware preparation chain involving VSS manipulation,
    backup destruction, and boot recovery disabling. Picus Red Report 2026 (#10
    technique, T1486) documents groups like Qilin, RansomHub, DragonForce,
    LockBit 3.0, Medusa, Lynx, Anubis, and Nefilim using hybrid encryption
    (AES/ChaCha20 + RSA/ECC). This rule detects the pre-encryption preparation
    sequence: starting VSS, deleting shadows, then disabling VSS - a pattern
    documented in RansomHub operations. Also detects Sandworm's ZEROLOT wiper,
    Sting wiper, and PathWiper techniques. Earth Alux APT also uses T1486.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1486/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.impact
    - attack.t1486
    - picus.redreport.2026
    - Qilin
    - RansomHub
    - DragonForce
    - LockBit
    - Medusa
    - Sandworm
logsource:
    category: process_creation
    product: windows
detection:
    selection_vss_delete:
        CommandLine|contains:
            - 'vssadmin.exe Delete Shadows'
            - 'vssadmin delete shadows'
            - 'wmic shadowcopy delete'
    selection_vss_disable:
        CommandLine|contains:
            - "ChangeStartMode Disabled"
            - 'sc config vss start= disabled'
    selection_bcdedit_recovery:
        Image|endswith: '\bcdedit.exe'
        CommandLine|contains:
            - 'recoveryenabled No'
            - 'bootstatuspolicy ignoreallfailures'
    selection_wallpaper_ransom:
        CommandLine|contains|all:
            - 'reg add'
            - 'Wallpaper'
            - 'ProgramData'
    selection_wbadmin:
        CommandLine|contains:
            - 'wbadmin delete catalog'
            - 'wbadmin delete systemstatebackup'
    condition: selection_vss_delete or selection_vss_disable or selection_bcdedit_recovery or selection_wallpaper_ransom or selection_wbadmin
falsepositives:
    - Legitimate VSS management by backup administrators (rare)
level: critical
