title: Malicious Service DLL Registration via Registry (Picus Sim 2026-04-12)
id: d4e5f6a7-2019-4bbb-c019-picus20260412
status: experimental
description: >
    Detects creation of svchost-hosted service DLL persistence by modifying
    the ServiceDll parameter under HKLM\SYSTEM\CurrentControlSet\Services and
    registering a new service group in the SvcHost registry key. Attackers
    create fake services (MPSEvtMan, StorSyncSvc, SvcHostDemo) that load
    malicious DLLs via svchost.exe. Observed in Picus simulation 2026-04-12
    with 3 distinct service DLL persistence chains.
    T1543.003 - Create or Modify System Process: Windows Service.
references:
    - https://attack.mitre.org/techniques/T1543/003/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1543.003
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_servicedll:
        Image|endswith: '\reg.exe'
        CommandLine|contains|all:
            - 'Services'
            - 'Parameters'
            - 'ServiceDll'
    selection_svchost_register:
        Image|endswith: '\reg.exe'
        CommandLine|contains|all:
            - 'SvcHost'
            - 'REG_MULTI_SZ'
    condition: selection_servicedll or selection_svchost_register
falsepositives:
    - Legitimate service installation by software installers
level: high
