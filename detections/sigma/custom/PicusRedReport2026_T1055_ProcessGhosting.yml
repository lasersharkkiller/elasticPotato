title: Process Ghosting - Delete-Pending File Execution (Picus Red Report 2026 - T1055)
id: a1b2c3d4-1002-4aaa-b002-000000000002
status: experimental
description: >
    Detects Process Ghosting, a stealthy injection technique where attackers create
    a process from a file marked for deletion (delete-pending state). The malicious
    content executes in memory while the backing file is removed from disk.
    CherryLoader malware was observed using this technique with CreateFile +
    DELETE flag, NtSetInformationFile with FILE_DISPOSITION_INFORMATION, then
    NtCreateSection and NtCreateProcess. Picus Red Report 2026 documents this as
    an emerging variant of T1055 Process Injection (30% prevalence, #1 technique).
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/techniques/T1055/012/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.defense-evasion
    - attack.t1055.012
    - picus.redreport.2026
    - CherryLoader
logsource:
    category: process_creation
    product: windows
detection:
    selection_image_deleted:
        Image|endswith:
            - '.exe'
        ImageLoaded|contains:
            - 'DELETE_PENDING'
    selection_parent_temp:
        ParentImage|contains:
            - '\Temp\'
            - '\AppData\Local\Temp\'
            - '\Downloads\'
        Image|endswith:
            - '.exe'
        IntegrityLevel: 'Medium'
    selection_api_pattern:
        CallTrace|contains:
            - 'NtSetInformationFile'
            - 'NtCreateSection'
    condition: selection_image_deleted or (selection_parent_temp and selection_api_pattern)
falsepositives:
    - Legitimate software installers that delete temp files during execution
level: high
