title: Mustang Panda LSASS Credential Dump via Mimikatz (Picus Red Report 2026)
id: a1b2c3d4-1016-4aaa-b016-000000000016
status: experimental
description: >
    Detects Mustang Panda's documented credential dumping pattern using Mimikatz
    to harvest LSASS memory. Picus Red Report 2026 documents Mustang Panda
    executing: mimikatz.exe "privilege::debug" "sekurlsa::logonPasswords" exit
    from %TMP% directory. Also uses SplatCloak for EDR evasion, Paklog/Corklog
    keyloggers, and RTLO masquerading with invalid digital signatures.
    Mustang Panda appears across T1036, T1059, and T1562 in the report.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/groups/G0129/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.credential-access
    - attack.t1003.001
    - attack.t1059.001
    - picus.redreport.2026
    - Mustang.Panda
logsource:
    category: process_creation
    product: windows
detection:
    selection_mimikatz_tmp:
        Image|contains: '\Temp\'
        CommandLine|contains:
            - 'sekurlsa::logonPasswords'
            - 'privilege::debug'
            - 'lsadump::sam'
            - 'lsadump::dcsync'
    selection_mimikatz_appdata:
        Image|contains:
            - '\AppData\'
            - '\ProgramData\'
            - '\Downloads\'
        Image|endswith: '.exe'
        CommandLine|contains: 'sekurlsa'
    condition: selection_mimikatz_tmp or selection_mimikatz_appdata
falsepositives:
    - Authorized penetration testing
level: critical
