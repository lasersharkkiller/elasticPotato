title: RegPhantom Kernel Rootkit - Registry C2 Channel and Driver Load Indicators
id: b3f7a912-c401-4d8e-9a12-regphantom001
status: experimental
description: >
    Detects indicators of the RegPhantom kernel rootkit. RegPhantom abuses
    CmRegisterCallback to intercept registry writes as a covert command channel.
    A usermode process writes a 56-byte XOR-encrypted REG_BINARY value to any
    registry key; the driver intercepts it, decrypts the payload, and reflectively
    loads an arbitrary PE into kernel memory. The write is blocked (STATUS_ACCESS_DENIED)
    so no registry artifact is created. Detection focuses on the driver binary loading
    from suspicious paths and known sample filenames. China-nexus, moderate confidence.
references:
    - https://www.nextron-systems.com/2026/03/20/regphantom-backdoor-threat-analysis/
    - https://attack.mitre.org/techniques/T1014/
    - https://attack.mitre.org/techniques/T1553/002/
author: Loaded Potato
date: 2026-04-10
tags:
    - attack.persistence
    - attack.defense-evasion
    - attack.privilege-escalation
    - attack.t1014
    - attack.t1553.002
    - attack.t1543.003
    - attack.t1112
    - RegPhantom
logsource:
    category: driver_load
    product: windows
detection:
    selection_known_filenames:
        ImageLoaded|endswith:
            - '\MapDriver.sys'
            - '\TestDriver.sys'
            - '\MyDriver.sys'
            - '\MyDriver-signed-20250619.sys'
            - '\MyDriver_0629.sys'
            - '\0629.sys'
            - '\0627.sys'
            - '\FsFilter.sys'
            - '\DevDriver.sys'
    selection_signed_suspects:
        SignatureStatus: 'Valid'
        Signature|contains:
            - 'Autel Intelligent Technology'
            - 'Guangzhou Xuanfeng Technology'
        ImageLoaded|endswith: '.sys'
    selection_unsigned_small_driver:
        Signed: 'false'
        ImageLoaded|endswith: '.sys'
        ImageLoaded|contains:
            - '\Temp\'
            - '\AppData\'
            - '\Downloads\'
            - '\ProgramData\'
            - '\Users\Public\'
    condition: selection_known_filenames or selection_signed_suspects or selection_unsigned_small_driver
falsepositives:
    - Legitimate Autel automotive diagnostic software loading signed drivers
    - Custom hardware drivers loaded from non-standard paths during development
level: critical
