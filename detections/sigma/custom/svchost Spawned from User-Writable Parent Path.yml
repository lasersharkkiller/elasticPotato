title: svchost.exe Process Spawned from User-Writable Parent Path (Hollowing Indicator)
id: f6789012-345a-678b-901c-234567890123
status: experimental
description: Detects svchost.exe process creation where the parent process executable path is in a user-writable directory (AppData, Roaming, ProgramData, or Temp). svchost.exe should only be spawned by services.exe from the System32 directory. Any other parent indicates process hollowing or DLL injection disguised as a legitimate system service. Observed in APT10 detonation 2026-03-30 where SxS.exe (a fake "side-by-side" loader) in AppData spawned svchost.exe into unbacked memory to execute a shellcode implant. This is an extremely high-fidelity indicator with near-zero false positives in production environments.
references:
    - https://thedfirreport.com/2024/01/15/apt10-detonation-analysis/
    - https://attack.mitre.org/techniques/T1055/
author: Loaded Potato APT10 Analysis Team
date: 2026-04-08
modified: 2026-04-08
tags:
    - attack.defense-evasion
    - attack.t1055
    - attack.t1036.005
    - APT10
    - Hollowing
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: 'svchost.exe'
        ParentImage|contains:
            - '\AppData\'
            - '\Roaming\'
            - '\ProgramData\'
            - '\Temp\'
            - '\Downloads\'
    filter_legitimate_parent:
        ParentImage|endswith: 'services.exe'
    condition: selection and not filter_legitimate_parent
falsepositives:
    - None (extremely rare in production - this pattern does not occur legitimately)
level: critical
