title: DLL Sideload from Non-Standard Path by LOLBin (Search Order Hijack)
id: e2f3a4b5-c6d7-8901-ef01-bbccddee0011
status: experimental
description: |
    Detects a LOLBin process loading a DLL from a non-standard directory
    (outside System32, SysWOW64, and Program Files). This is the observable
    artefact of DLL search order hijacking where an attacker calls
    SetDllDirectory / AddDllDirectory to inject their path before the normal
    Windows DLL search order, then triggers a LoadLibrary.

    EDR gap context (api_call_matrix.ps1):
      SetDllDirectoryW / AddDllDirectory: 5 of 7 EDRs have NO hook
      (MDE=-, CB=-, EL=-, XDR=-, TM=-). Sysmon image_load on non-standard
      DLL paths is the primary compensating control available.

    Path exclusions deliberately narrow — DLLs in user temp/appdata/desktop
    loaded by a LOLBin are almost never legitimate.
references:
    - https://attack.mitre.org/techniques/T1574/001/
    - https://hijacklibs.net/
author: Loaded Potato / lasersharkkiller
date: 2026-04-06
tags:
    - attack.defense_evasion
    - attack.t1574.001
    - attack.persistence
logsource:
    category: image_load
    product: windows
detection:
    selection_lolbin:
        Image|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\msiexec.exe'
            - '\svchost.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
    filter_standard_paths:
        ImageLoaded|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
            - 'C:\Windows\WinSxS\'
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
            - 'C:\Windows\assembly\'
            - 'C:\Windows\Microsoft.NET\'
    condition: selection_lolbin and not filter_standard_paths
falsepositives:
    - Legitimate software that ships DLLs alongside LOLBin wrappers (e.g. some
      enterprise AV/DLP products that inject via rundll32 from their install dir)
    - Script-based installers that briefly use wscript from a staging directory
level: medium
