title: DLL Loaded from User-Writable Path by Signed Process (UH_DLLLOAD)
id: b1c2d3e4-f5a6-7890-bcde-111222333444
status: experimental
description: |
    Detects any signed Windows process loading a DLL from a user-writable
    location (Temp, AppData, Downloads, Desktop, ProgramData).

    Broadens the LOLBin-only DLL sideload rule to cover UH_DLLLOAD
    (SetDllDirectory / AddDllDirectory) abuse by any signed process whose
    DLL search path has been poisoned. An attacker drops a malicious DLL in
    a user-writable directory ahead of the legitimate app search path, then
    triggers the app to load it.

    EDR gap context (api_call_matrix.ps1):
      SetDllDirectoryW / AddDllDirectory: 5 of 7 EDRs have NO hook
      (MDE=-, CB=-, EL=-, XDR=-, TM=-). Sysmon image_load is the primary
      compensating control for the path-based observable.
references:
    - https://attack.mitre.org/techniques/T1574/001/
    - https://hijacklibs.net/
author: Loaded Potato / lasersharkkiller
date: 2026-04-07
tags:
    - attack.defense_evasion
    - attack.t1574.001
    - attack.persistence
logsource:
    category: image_load
    product: windows
detection:
    selection:
        ImageLoaded|startswith:
            - 'C:\Users\'
            - 'C:\Windows\Temp\'
            - 'C:\Temp\'
            - 'C:\ProgramData\'
    filter_standard_software:
        # Common apps that legitimately load from user paths
        Image|endswith:
            - '\OneDrive.exe'
            - '\Teams.exe'
            - '\Slack.exe'
            - '\zoom.exe'
            - '\chrome.exe'
            - '\msedge.exe'
            - '\firefox.exe'
            - '\Code.exe'
            - '\WindowsTerminal.exe'
    filter_microsoft_programdata:
        ImageLoaded|startswith:
            - 'C:\ProgramData\Microsoft\'
            - 'C:\ProgramData\Package Cache\'
    condition: selection and not (filter_standard_software or filter_microsoft_programdata)
falsepositives:
    - Portable apps that ship DLLs in user profile directories
    - Development tools (VS, Python, Node) loading modules from AppData
    - Tune aggressively with allowlisted process names and known-good DLL paths
level: medium
