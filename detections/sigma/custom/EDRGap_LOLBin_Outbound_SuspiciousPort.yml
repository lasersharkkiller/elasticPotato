title: LOLBin Network Connection to Suspicious Port (UH_FIBER UH_THREADPOOL UH_TIMER)
id: f5a6b7c8-d9e0-1234-fabc-555666777888
status: experimental
description: |
    Detects LOLBin or script host processes making outbound network connections
    to ports commonly used by C2 frameworks (4444, 4445, 1337, 8888, 9001,
    50050) — the post-execution network artefact of in-process shellcode
    execution techniques that generate no child process or library load events.

    Techniques covered by this rule:
      UH_FIBER    — CreateFiber/SwitchToFiber shellcode runs in-thread
      UH_THREADPOOL — QueueUserWorkItem/CreateThreadpoolWork in-thread exec
      UH_TIMER    — SetWaitableTimer/CreateTimerQueueTimer APC callback
      UH_CALLBACK — EnumSystemLocales/EnumWindows callback abuse
      UH_WINPROC  — CallWindowProc/SendMessage shellcode dispatch
      UH_HEAP     — HeapCreate/HeapAlloc staging without VirtualAlloc

    All of these execute shellcode inside an existing process without spawning
    a child; the C2 beacon is the only Sysmon-observable artefact. The port
    filter distinguishes known C2 ports (Metasploit, Cobalt Strike, Havoc,
    Sliver) from legitimate LOLBin network activity.

    EDR gap context (api_call_matrix.ps1): 5-7 of 7 EDRs have no hook
    coverage for the above allocation/execution APIs.
references:
    - https://attack.mitre.org/techniques/T1071/
    - https://attack.mitre.org/techniques/T1055/
    - https://github.com/aahmad097/AlternativeShellcodeExec
author: Loaded Potato / lasersharkkiller
date: 2026-04-07
tags:
    - attack.command_and_control
    - attack.t1071
    - attack.defense_evasion
    - attack.t1055
logsource:
    category: network_connection
    product: windows
detection:
    selection_lolbin:
        Image|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
        Initiated: 'true'
    selection_c2_ports:
        DestinationPort:
            - 4444
            - 4445
            - 1337
            - 8888
            - 9001
            - 50050
            - 8443
            - 8080
    filter_loopback:
        DestinationIp|startswith:
            - '127.'
            - '::1'
            - '169.254.'
    condition: selection_lolbin and selection_c2_ports and not filter_loopback
falsepositives:
    - Development environments running local servers on these ports
    - Security testing tools — verify context before escalating
level: high
