title: SilentProcessExit Monitoring Abuse for Persistence (Picus Sim 2026-04-12)
id: d4e5f6a7-2001-4bbb-c001-picus20260412
status: experimental
description: >
    Detects modification of the SilentProcessExit registry key to register a
    MonitorProcess that executes when a target process exits. Attackers abuse
    this IFEO sub-key to persist or execute payloads (e.g., PowerShell scripts)
    when benign processes like mspaint.exe or notepad.exe terminate. Observed
    in Picus full Windows red team simulation 2026-04-12 where MonitorProcess
    was set to a hidden PowerShell command triggered on mspaint.exe exit.
    T1546.012 - Event Triggered Execution: Image File Execution Options Injection.
references:
    - https://attack.mitre.org/techniques/T1546/012/
    - https://learn.microsoft.com/en-us/windows-hardware/drivers/debugger/registry-entries-for-silent-process-exit
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1546.012
    - picus.simulation.2026-04-12
logsource:
    category: registry_set
    product: windows
detection:
    selection_path:
        TargetObject|contains: 'SOFTWARE\Microsoft\Windows NT\CurrentVersion\SilentProcessExit\'
    selection_values:
        TargetObject|endswith:
            - '\MonitorProcess'
            - '\ReportingMode'
            - '\GlobalFlag'
    condition: selection_path and selection_values
falsepositives:
    - Legitimate debugging tools configuring WER silent exit monitoring
    - Application compatibility shims (very rare)
level: high
