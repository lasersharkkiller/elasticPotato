title: UNC3886 Junos OS Shell Exploitation and History Clearing (Picus Red Report 2026)
id: a1b2c3d4-1017-4aaa-b017-000000000017
status: experimental
description: >
    Detects UNC3886 (China-nexus) TTPs targeting Juniper Networks Junos OS routers
    with TINYSHELL backdoor variants. The group uses the underlying FreeBSD shell
    accessible from Junos CLI to bypass Veriexec file integrity, deploy rootkit-like
    malware, and clear shell history for anti-forensics. Commands include
    export HISTFILE='', unset HISTFILE, history -c, and rm -f $HOME/.sh_history.
    Also uses mkfifo and dd for code injection via named pipes. Documented in
    Picus Red Report 2026 under T1059.008 Network Device CLI.
references:
    - https://www.picussecurity.com/red-report-2026
    - https://attack.mitre.org/groups/G1042/
author: Loaded Potato - Picus Red Report 2026 Analysis
date: 2026-04-09
tags:
    - attack.execution
    - attack.defense-evasion
    - attack.t1059.008
    - attack.t1070.003
    - picus.redreport.2026
    - UNC3886
    - TINYSHELL
logsource:
    category: process_creation
    product: linux
detection:
    selection_history_clear:
        CommandLine|contains:
            - "export HISTFILE=''"
            - 'unset HISTFILE'
            - 'history -c'
            - 'rm -f $HOME/.sh_history'
            - 'rm -f ~/.bash_history'
    selection_pipe_injection:
        CommandLine|contains|all:
            - 'mkfifo'
            - 'dd'
    selection_veriexec_bypass:
        CommandLine|contains:
            - '/proc/*/mem'
            - 'cat /dev/null |'
    condition: selection_history_clear or selection_pipe_injection or selection_veriexec_bypass
falsepositives:
    - System administrators clearing history during maintenance
    - Legitimate use of named pipes
level: high
