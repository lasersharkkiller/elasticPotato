title: Service Creation with Command Shell Binpath (Picus Sim 2026-04-12)
id: d4e5f6a7-2006-4bbb-c006-picus20260412
status: experimental
description: >
    Detects sc.exe creating a service where the binpath contains cmd.exe,
    powershell.exe, or other script interpreters. Legitimate services use
    dedicated service executables, not command shells. Observed in Picus
    simulation 2026-04-12 creating service 'evilsvc' with binpath
    'cmd.exe /c hostname' running as LocalSystem. Also covers SharPersist
    automated service persistence with cmd.exe /c payloads.
    T1543.003 - Create or Modify System Process: Windows Service.
references:
    - https://attack.mitre.org/techniques/T1543/003/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1543.003
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_sc_create:
        Image|endswith: '\sc.exe'
        CommandLine|contains: 'create'
    filter_suspicious_binpath:
        CommandLine|contains:
            - 'binpath= "cmd'
            - 'binpath= cmd'
            - 'binPath= "cmd'
            - 'binpath= "powershell'
            - 'binpath= powershell'
            - 'binPath= "powershell'
            - 'binpath= "mshta'
            - 'binpath= "wscript'
            - 'binpath= "cscript'
            - 'binpath= "rundll32'
    condition: selection_sc_create and filter_suspicious_binpath
falsepositives:
    - Some legacy deployment scripts may wrap services in cmd.exe (should be investigated)
level: high
