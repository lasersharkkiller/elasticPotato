title: COM Automation Script Engine Spawning LOLBin (IDispatch::Invoke Abuse)
id: a8b9c0d1-e2f3-4567-cdef-999000111222
status: experimental
description: |
    Detects Windows script host processes (wscript, cscript, mshta) spawning
    LOLBin child processes — the observable process-creation artefact of
    IDispatch::Invoke-based execution via COM automation.

    IDispatch::Invoke routes execution through a COM vtable rather than a named
    DLL import, bypassing pe.imports()-based YARA detection entirely and avoiding
    many EDR API hooks that target CreateProcess directly. Attackers exploit this
    via WScript.Shell.Run(), Shell.Application.ShellExecute(), or custom COM server
    objects instantiated from script engines (VBScript, JScript, PowerShell COM).

    EDR gap context (api_call_matrix.ps1):
      IDispatch::Invoke (UH_CLR group): COM vtable dispatch — no named DLL import
      hook possible in ole32.dll. All 7 EDRs rely on behavioral/process-tree
      detection only. Process ancestry (Sysmon process_creation) is the primary
      compensating control.

    Common exploitation patterns:
      - WScript.Shell.Run() / .Exec() → spawns cmd.exe, powershell.exe
      - Shell.Application.ShellExecute() → spawns any LOLBin
      - MMC20.Application.ExecuteShellCommand() → lateral movement
      - Custom COM server DLL loaded by wscript/mshta
references:
    - https://attack.mitre.org/techniques/T1059/005/
    - https://attack.mitre.org/techniques/T1218/
    - https://lolbas-project.github.io/
    - https://www.ired.team/offensive-security/code-execution/t1191-cmstp-code-execution
author: Loaded Potato / lasersharkkiller
date: 2026-04-06
tags:
    - attack.execution
    - attack.t1059.005
    - attack.defense_evasion
    - attack.t1218
logsource:
    category: process_creation
    product: windows
detection:
    selection_script_parent:
        ParentImage|endswith:
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    selection_lolbin_child:
        Image|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\msiexec.exe'
            - '\wmic.exe'
            - '\installutil.exe'
            - '\cmstp.exe'
            - '\ieexec.exe'
            - '\pcalua.exe'
    condition: selection_script_parent and selection_lolbin_child
falsepositives:
    - Enterprise software installation scripts that invoke LOLBins via WSH
    - Some legitimate administration scripts — review command line and script source path
    - SCCM/ConfigMgr deployment scripts that call msiexec via wscript
level: high
