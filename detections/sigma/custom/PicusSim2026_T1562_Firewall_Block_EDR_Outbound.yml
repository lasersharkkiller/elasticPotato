title: Firewall Rule Blocking EDR/Defender Outbound Communications (Picus Sim 2026-04-12)
id: d4e5f6a7-2020-4bbb-c020-picus20260412
status: experimental
description: >
    Detects creation of Windows Firewall rules that block outbound connections
    for security products (MsMpEng.exe, MsSense.exe, SenseCncProxy.exe) on
    port 443. This prevents Defender and ATP from reporting telemetry to cloud
    services, effectively blinding security monitoring. Observed in Picus
    simulation 2026-04-12 with 3 separate firewall rules blocking Defender,
    ATP sensor, and CNC proxy.
    T1562.004 - Impair Defenses: Disable or Modify System Firewall.
references:
    - https://attack.mitre.org/techniques/T1562/004/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.defense-evasion
    - attack.t1562.004
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_fw_block:
        CommandLine|contains:
            - 'New-NetFirewallRule'
            - 'netsh'
    filter_block_security:
        CommandLine|contains:
            - 'MsMpEng'
            - 'MsSense'
            - 'SenseCncProxy'
            - 'WinDefend'
            - 'Windows Defender'
    filter_block_action:
        CommandLine|contains:
            - 'Block'
            - 'block'
    condition: selection_fw_block and filter_block_security and filter_block_action
falsepositives:
    - Legitimate network segmentation (should not block security products)
level: critical
