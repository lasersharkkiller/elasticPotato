title: Unhooked Shellcode Execution via Fibers or Thread Pool
id: 22b3c4d5-e6f7-8901-bcde-f01234567890
status: experimental
description: |
    Detects process activity consistent with fiber-based or thread pool-based
    shellcode execution — techniques that bypass EDR hooks on CreateRemoteThread
    and CreateRemoteThreadEx by executing code through pre-existing OS thread
    infrastructure.

    Fiber execution: CreateFiber sets up a new execution context in the same
    thread. SwitchToFiber transfers control. If the fiber function pointer is
    shellcode, code executes with no thread creation event (no Sysmon Event 8).

    Thread pool: QueueUserWorkItem / CreateThreadpoolWork submit a callback to
    a pool worker thread. Same result — code execution with no CreateThread hook.

    From APIDifferentialAnalysis.json:
      CreateFiber:         15 malicious samples
      SwitchToFiber:       15 malicious samples
      CreateThreadpoolWork: 13 malicious samples
      QueueUserWorkItem:    5 malicious samples
references:
    - https://research.nccgroup.com/2021/01/23/rift-analysing-a-lazarus-shellcode-execution-technique/
    - https://www.ired.team/offensive-security/code-injection-process-injection/thread-pool-execution
    - https://persistence-info.github.io/Data/thread_pool.html
author: Loaded Potato / lasersharkkiller
date: 2026-04-06
tags:
    - attack.defense_evasion
    - attack.t1055
    - attack.execution
    - attack.t1106
logsource:
    product: windows
    category: process_access
    # Sysmon Event 10 — process accessed. Combined with ETW thread start
    # address monitoring (Elastic Endpoint, Defender ATP) for best coverage.
detection:
    # Primary: suspicious source process accessing its own memory in unusual ways
    # (Sysmon 10 won't catch local thread ops, so look for LOLBIN processes
    # spawning unusual children immediately after — behavioral chaining)
    selection_lolbin_parent:
        ParentImage|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\msiexec.exe'
    selection_suspicious_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\net.exe'
            - '\net1.exe'
            - '\whoami.exe'
            - '\ipconfig.exe'
    condition: selection_lolbin_parent and selection_suspicious_child
falsepositives:
    - Legitimate software using fiber pools (SQL Server, game engines)
    - Chrome V8 uses fibers internally — filter Chrome children
level: medium
