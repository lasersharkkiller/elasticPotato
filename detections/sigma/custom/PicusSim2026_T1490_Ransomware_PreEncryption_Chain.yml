title: Ransomware Pre-Encryption Behavior Chain (Picus Sim 2026-04-12)
id: d4e5f6a7-2022-4bbb-c022-picus20260412
status: experimental
description: >
    Detects ransomware pre-encryption behaviors including backup deletion via
    wbadmin, recovery configuration tampering via bcdedit, and volume shadow
    service manipulation. These actions are typically performed in rapid sequence
    before file encryption begins. Covers Conti -shadowops flag, wbadmin delete
    catalog/backup/systemstatebackup, and bcdedit bootstatuspolicy/recoveryenabled
    modifications. Observed in Picus simulation 2026-04-12.
    T1490 - Inhibit System Recovery.
references:
    - https://attack.mitre.org/techniques/T1490/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.impact
    - attack.t1490
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_wbadmin_delete:
        Image|endswith: '\wbadmin.exe'
        CommandLine|contains:
            - 'delete catalog'
            - 'delete backup'
            - 'delete systemstatebackup'
    selection_bcdedit_recovery:
        Image|endswith: '\bcdedit.exe'
        CommandLine|contains:
            - 'recoveryenabled no'
            - 'bootstatuspolicy ignoreallfailures'
    selection_conti:
        CommandLine|contains: '-shadowops'
    selection_volsnap:
        Image|endswith: '\IOCTL_VOLSNAP_SET_MAX_DIFF_AREA_SIZE.exe'
    condition: selection_wbadmin_delete or selection_bcdedit_recovery or selection_conti or selection_volsnap
falsepositives:
    - Legitimate backup management (wbadmin delete with -keepVersions > 0)
level: critical
