title: LOLBin Spawning Child Process with No Command Line Arguments (UH_WINPROC UH_CALLBACK)
id: d3e4f5a6-b7c8-9012-defa-333444555666
status: experimental
description: |
    Detects rundll32.exe or regsvr32.exe spawning a child process with an
    empty or missing command line — the process-creation artefact of these
    LOLBins being used as in-process shellcode hosts.

    When shellcode executes via UH_WINPROC (CallWindowProc/SendMessage),
    UH_CALLBACK (EnumSystemLocales/EnumWindows), or UH_TIMER (SetWaitableTimer)
    inside rundll32/regsvr32, it may subsequently call CreateProcess to launch
    a second stage with no visible arguments (empty command line) as a staging
    step before injecting into the new process.

    Legitimate LOLBin invocations almost always include arguments. A child
    spawned with no args from rundll32 or regsvr32 is highly anomalous.

    EDR gap context (api_call_matrix.ps1):
      CallWindowProc: 6/7 blind (S1=-, MDE=-, CB=-, EL=-, XDR=-, TM=-)
      EnumSystemLocales: 5/7 blind (MDE=-, CB=-, EL=-, XDR=-, TM=-)
      SetWaitableTimer: 5/7 blind (MDE=-, CB=-, EL=-, XDR=-, TM=-)
references:
    - https://attack.mitre.org/techniques/T1055/
    - https://attack.mitre.org/techniques/T1218/
    - https://github.com/aahmad097/AlternativeShellcodeExec
author: Loaded Potato / lasersharkkiller
date: 2026-04-07
tags:
    - attack.defense_evasion
    - attack.t1055
    - attack.t1218
    - attack.execution
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        ParentImage|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
        CommandLine: ''
    selection_null:
        ParentImage|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
        CommandLine|contains: ''
    filter_has_args:
        CommandLine|re: '.{2,}'
    condition: selection and not filter_has_args
falsepositives:
    - Uncommon — investigate any match; legitimate software almost always passes arguments
level: high
