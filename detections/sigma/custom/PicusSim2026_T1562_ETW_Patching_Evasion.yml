title: ETW Event Tracing Patching for Defense Evasion (Picus Sim 2026-04-12)
id: d4e5f6a7-2013-4bbb-c013-picus20260412
status: experimental
description: >
    Detects tools that patch ETW (Event Tracing for Windows) functions in ntdll.dll
    to blind EDR sensors and prevent telemetry collection. Covers dedicated ETW
    patching tools (TamperETW, patch_etw_rust, Etwunhook) and PowerShell-based
    ETW disable via COMPlus_ETWEnabled=0. Also covers combined AMSI+ETW patchers
    (SnD_AMSI). Observed in Picus simulation 2026-04-12 with 5 different ETW
    bypass implementations.
    T1562.006 - Impair Defenses: Indicator Blocking.
references:
    - https://attack.mitre.org/techniques/T1562/006/
author: Loaded Potato - Picus Simulation 2026-04-12
date: 2026-04-13
tags:
    - attack.defense-evasion
    - attack.t1562.006
    - picus.simulation.2026-04-12
logsource:
    category: process_creation
    product: windows
detection:
    selection_etw_tools:
        Image|endswith:
            - '\TamperETW.exe'
            - '\patch_etw_rust.exe'
            - '\Etwunhook.exe'
            - '\SnD_AMSI.exe'
    selection_etw_env:
        CommandLine|contains: 'COMPlus_ETWEnabled=0'
    selection_etw_api:
        CommandLine|contains:
            - 'EtwEventWrite'
            - 'NtTraceEvent'
            - 'EtwNotificationRegister'
    condition: selection_etw_tools or selection_etw_env or selection_etw_api
falsepositives:
    - Authorized red team exercises
    - Legitimate debugging of ETW providers (extremely rare)
level: critical
