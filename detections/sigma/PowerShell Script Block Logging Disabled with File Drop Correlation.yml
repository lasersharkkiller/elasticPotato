title: PowerShell Script Block Logging Disabled Followed by File Drop
id: e5678901-f234-567a-890b-123456789012
status: experimental
description: Detects the pattern of disabling PowerShell Script Block Logging followed by suspicious file creation in user-writable directories within a short time window. This indicates an attack chain where the actor disables logging to hide subsequent malicious PowerShell execution. APT10 detonation 2026-03-30 disabled PS logging immediately before file drop activity. Legitimate administrative scripts do not disable logging immediately before creating files in AppData. The correlation of these two events within 60 seconds strongly indicates malicious PowerShell activity.
references:
    - https://thedfirreport.com/2024/01/15/apt10-detonation-analysis/
    - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_logging
author: Loaded Potato APT10 Analysis Team
date: 2026-04-08
modified: 2026-04-08
tags:
    - attack.defense-evasion
    - attack.t1562.002
    - attack.execution
    - APT10
logsource:
    category: process_creation
    product: windows
detection:
    selection_ps_logging_disable:
        Image|endswith: 'powershell.exe'
        CommandLine|contains:
            - 'ScriptBlockLogging'
            - 'Set-ItemProperty'
            - 'HKLM:\Software\Policies\Microsoft\Windows\PowerShell'
            - 'EnableScriptBlockLogging'
            - '$false'
    selection_file_drop:
        Image|endswith: 'powershell.exe'
        TargetFilename|contains:
            - '\AppData\'
            - '\Temp\'
            - '\Downloads\'
    timeframe: 60s
    condition: selection_ps_logging_disable | near selection_file_drop
falsepositives:
    - Legitimate system administration scripts (rare - false positive rate should be <1%)
level: high
