# ============================================================
# Hardened rsyslog configuration snippet
# Reference: CIS Linux Benchmark 4.2.2 / NIST 800-53 AU-3, AU-12
#
# Deployed to: /etc/rsyslog.d/99-hardened.conf
# by Set-LoggingPolicy in the LinuxHardening module.
#
# This file supplements (not replaces) /etc/rsyslog.conf.
# It sets secure defaults for file creation, drops privileges,
# and ensures auth/kernel/cron messages are captured.
# ============================================================

# -- File and directory creation permissions ----------------------------
# All log files created by rsyslog will have mode 0640 (rw-r-----)
$FileCreateMode 0640
# Directories created by rsyslog will have mode 0750
$DirCreateMode 0750
# Process umask — limits permissions on created objects
$Umask 0027

# -- Drop privileges after binding to ports ----------------------------
# Change to the syslog user and adm group after startup
$PrivDropToUser  syslog
$PrivDropToGroup adm

# ======================================================================
# Facility/severity routing
# CIS 4.2.2.2 — Ensure logging is configured for auth and authpriv
# ======================================================================

# Authentication and privilege-related messages (su, sudo, sshd, PAM, etc.)
auth,authpriv.*                                 /var/log/auth.log

# All messages except auth/authpriv — general syslog
# The leading '-' enables async (buffered) writes for performance
*.*;auth,authpriv.none                          -/var/log/syslog

# Kernel messages (ring buffer, boot messages, hardware errors)
kern.*                                          /var/log/kern.log

# Cron daemon job execution
cron.*                                          /var/log/cron.log

# Mail subsystem
mail.*                                          -/var/log/mail.log
mail.err                                        /var/log/mail.err

# Emergency-level messages broadcast to all logged-in users
*.emerg                                         :omusrmsg:*

# -- Recommended: enable high-precision timestamps in RFC 3339 format ---
# Uncomment to include sub-second timestamp precision in log entries
# $ActionFileDefaultTemplate RSYSLOG_FileFormat

# ======================================================================
# Remote logging (optional — uncomment and configure for SIEM forwarding)
# CIS 4.2.2.4 — Ensure remote logging uses an encrypted channel (TLS)
# ======================================================================

# DO NOT use unencrypted UDP/TCP remote syslog in production.
# Use the omrelp module with TLS for encrypted transport:
#
# module(load="omrelp")
# action(
#   type="omrelp"
#   target="siem.example.com"
#   port="6514"
#   tls="on"
#   tls.caCert="/etc/ssl/certs/ca-bundle.crt"
#   tls.myCert="/etc/ssl/rsyslog/client.crt"
#   tls.myPrivKey="/etc/ssl/rsyslog/client.key"
# )
