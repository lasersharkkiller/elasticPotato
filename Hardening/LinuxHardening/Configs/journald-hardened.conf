# ============================================================
# Hardened systemd-journald configuration
# Reference: CIS Linux Benchmark 4.2.1 / NIST 800-53 AU-11
#
# Deployed to: /etc/systemd/journald.conf.d/99-hardened.conf
# by Set-LoggingPolicy in the LinuxHardening module.
#
# Using the conf.d drop-in directory ensures these settings
# take precedence over distro defaults in /etc/systemd/journald.conf
# without modifying that file directly.
# ============================================================

[Journal]

# CIS 4.2.1.1 — Persist logs to disk across reboots
# volatile  = RAM only (logs lost on reboot)
# persistent = /var/log/journal (survives reboot)
Storage=persistent

# CIS 4.2.1.2 — Compress journal files to save disk space
Compress=yes

# CIS 4.2.1.3 — Forward entries to syslog (rsyslog/syslog-ng)
# Enables centralized log collection alongside the journal
ForwardToSyslog=yes

# -- Disk space limits -----------------------------------------------
# CIS 4.2.1.4 — Limit total journal size on disk
# Prevents runaway journal growth filling /var/log/journal/
SystemMaxUse=500M

# Minimum free space to keep on the filesystem before trimming journal
SystemKeepFree=100M

# Maximum size of a single journal file before rotation
SystemMaxFileSize=50M

# Runtime journal (RAM, for volatile storage or pre-persistence phase)
RuntimeMaxUse=100M
RuntimeKeepFree=50M

# CIS 4.2.1.5 — Maximum age of journal entries before rotation
# Entries older than this are pruned on next vacuum/rotation
MaxFileSec=1month

# Maximum age of archived journal files (0 = no time-based pruning)
MaxRetentionSec=1year

# -- Rate limiting ---------------------------------------------------
# Prevent a chatty process from flooding the journal
# 10000 messages per 30-second window before rate-limiting kicks in
RateLimitInterval=30s
RateLimitBurst=10000

# -- Integrity / sealing ---------------------------------------------
# Forward-secure sealing: cryptographically sign journal entries
# so tampering can be detected. Requires systemd-journal-remote package.
# Set to "yes" only after setting up verification keys (journalctl --setup-keys)
# Seal=yes

# -- Console / kernel forwarding -------------------------------------
# Forward emergency messages to the kernel message buffer (kmsg)
ForwardToKMsg=no

# Broadcast emergency-level messages to all logged-in users (wall)
ForwardToWall=yes

# -- Timestamp precision ---------------------------------------------
# Realtime timestamps for log entries (microsecond precision)
# MaxLevelStore — minimum severity to store to disk (debug and above = everything)
# MaxLevelSyslog — minimum severity forwarded to syslog
MaxLevelStore=debug
MaxLevelSyslog=debug
